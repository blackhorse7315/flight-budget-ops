<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinAir Pro - Manajemen Keuangan</title>
    
    <!-- Konfigurasi Ikon Aplikasi -->
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FinAir Pro">
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232563eb' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Crect x='3' y='3' width='18' height='18' rx='2' ry='2'%3E%3C/rect%3E%3Cpath d='M3 9h18'%3E%3C/path%3E%3Cpath d='M9 21V9'%3E%3C/path%3E%3Cpath d='M12 12l3 3 5-5'%3E%3C/path%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%232563eb'%3E%3Crect width='24' height='24' rx='5' fill='%232563eb'/%3E%3Cpath d='M6 6h12v12H6z' fill='none'/%3E%3Cpath d='M12 4L3 9v11h18V9l-9-5zm0 2.18L19 10v8H5v-8l7-3.82zM12 12a2 2 0 100-4 2 2 0 000 4z' fill='white'/%3E%3C/svg%3E">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .modal-animate-in { animation: zoomIn 0.15s ease-out; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.98) translateY(5px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        #loader { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.7); backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body class="text-slate-900 pb-12">

    <div id="loader">
        <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-sm font-bold text-blue-600 animate-pulse uppercase tracking-widest">Sinkronisasi Cloud...</p>
    </div>

    <!-- Navigasi Utama -->
    <nav class="sticky top-0 z-40 w-full bg-white/80 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center gap-4">
                <div class="flex items-center gap-3 shrink-0">
                    <div class="bg-blue-600 p-2.5 rounded-2xl shadow-lg shadow-blue-200 text-white">
                        <i data-lucide="layout-dashboard" class="w-6 h-6"></i>
                    </div>
                    <div class="hidden md:block">
                        <span class="text-xl font-extrabold tracking-tight text-slate-800 block leading-none">FinAir Pro</span>
                        <span class="text-[10px] font-bold text-blue-600 uppercase tracking-widest">Aviation Management</span>
                    </div>
                </div>
                
                <div class="flex flex-1 justify-center overflow-hidden">
                    <div class="flex bg-slate-100 p-1.5 rounded-2xl gap-1 overflow-x-auto no-scrollbar max-w-full">
                        <button id="tab-crew" onclick="switchTab('crew')" class="px-4 py-2 rounded-xl text-xs font-bold transition-all whitespace-nowrap bg-white text-blue-600 shadow-sm">Crew</button>
                        <button id="tab-others" onclick="switchTab('others')" class="px-4 py-2 rounded-xl text-xs font-bold transition-all whitespace-nowrap text-slate-500 hover:text-slate-700">Others</button>
                        <button id="tab-income" onclick="switchTab('income')" class="px-4 py-2 rounded-xl text-xs font-bold transition-all whitespace-nowrap text-slate-500 hover:text-slate-700">Dana Masuk</button>
                        <button id="tab-kas" onclick="switchTab('kas')" class="px-4 py-2 rounded-xl text-xs font-bold transition-all whitespace-nowrap text-slate-500 hover:text-slate-700">Dana Kas</button>
                        <button id="tab-summary" onclick="switchTab('summary')" class="px-4 py-2 rounded-xl text-xs font-bold transition-all whitespace-nowrap text-slate-500 hover:text-slate-700">Summary</button>
                    </div>
                </div>

                <div class="shrink-0 flex gap-2">
                    <button onclick="fetchAllData()" class="p-2.5 bg-slate-100 text-slate-500 rounded-2xl hover:bg-slate-200 transition-all" title="Refresh Data">
                        <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                    </button>
                    <button onclick="openModal()" class="flex items-center gap-2 bg-slate-900 hover:bg-black text-white px-4 md:px-5 py-2.5 rounded-2xl transition-all shadow-lg active:scale-95 text-xs font-bold">
                        <i data-lucide="plus" class="w-4 h-4"></i>
                        <span class="hidden sm:inline">Tambah</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Dashboard Utama -->
        <div id="main-stats" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-10">
            <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100">
                <div class="flex justify-between items-start mb-3">
                    <div class="bg-emerald-50 p-2 rounded-xl text-emerald-600"><i data-lucide="arrow-down-left" class="w-5 h-5"></i></div>
                    <span class="text-[9px] font-bold bg-emerald-100 text-emerald-700 px-2 py-1 rounded-lg uppercase tracking-wider">Income</span>
                </div>
                <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Total Dana Masuk</p>
                <h3 id="stat-income-total" class="text-xl font-black text-emerald-600 tracking-tight">Rp 0</h3>
            </div>
            <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100">
                <div class="flex justify-between items-start mb-3">
                    <div class="bg-blue-50 p-2 rounded-xl text-blue-600"><i data-lucide="plane" class="w-5 h-5"></i></div>
                    <span class="text-[9px] font-bold bg-blue-100 text-blue-700 px-2 py-1 rounded-lg uppercase tracking-wider">Crew</span>
                </div>
                <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Total Pengeluaran Crew</p>
                <h3 id="stat-crew-total" class="text-xl font-black tracking-tight text-slate-800">Rp 0</h3>
            </div>
            <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100">
                <div class="flex justify-between items-start mb-3">
                    <div class="bg-orange-50 p-2 rounded-xl text-orange-600"><i data-lucide="credit-card" class="w-5 h-5"></i></div>
                    <span class="text-[9px] font-bold bg-orange-100 text-orange-700 px-2 py-1 rounded-lg uppercase tracking-wider">Others</span>
                </div>
                <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Total Lainnya</p>
                <h3 id="stat-others-total" class="text-xl font-black tracking-tight text-slate-800">Rp 0</h3>
            </div>
            <div class="bg-slate-900 p-5 rounded-[2rem] shadow-2xl text-white relative overflow-hidden group">
                <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:scale-110 transition-transform text-white">
                    <i data-lucide="wallet" class="w-16 h-16"></i>
                </div>
                <div class="relative z-10">
                    <p class="text-[10px] text-blue-100 font-bold uppercase opacity-80 mb-1">Sisa Saldo</p>
                    <h3 id="stat-balance" class="text-2xl font-black tracking-tight text-white">Rp 0</h3>
                </div>
            </div>
        </div>

        <!-- Dashboard Dana Kas -->
        <div id="kas-stats" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mb-10">
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                <div class="flex justify-between items-start mb-3">
                    <div class="bg-blue-50 p-3 rounded-2xl text-blue-600"><i data-lucide="database" class="w-6 h-6"></i></div>
                    <span class="text-[9px] font-bold bg-blue-100 text-blue-700 px-2 py-1 rounded-lg uppercase tracking-widest">Dana Kas</span>
                </div>
                <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Total Dana Masuk Kas</p>
                <h3 id="stat-kas-in-total" class="text-xl font-black text-blue-600 tracking-tight">Rp 0</h3>
            </div>
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                <div class="flex justify-between items-start mb-3">
                    <div class="bg-red-50 p-3 rounded-2xl text-red-600"><i data-lucide="external-link" class="w-6 h-6"></i></div>
                    <span class="text-[9px] font-bold bg-red-100 text-red-700 px-2 py-1 rounded-lg uppercase tracking-widest">Metu</span>
                </div>
                <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Total Pengeluaran Kas</p>
                <h3 id="stat-kas-out-total" class="text-xl font-black text-red-600 tracking-tight">Rp 0</h3>
            </div>
            <div class="bg-slate-800 p-6 rounded-[2rem] shadow-xl text-white relative overflow-hidden group">
                <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:scale-110 transition-transform text-white">
                    <i data-lucide="banknote" class="w-16 h-16"></i>
                </div>
                <div class="relative z-10">
                    <p class="text-[10px] text-slate-300 font-bold uppercase opacity-80 mb-1">Saldo Kas Bersih</p>
                    <h3 id="stat-kas-balance" class="text-2xl font-black tracking-tight">Rp 0</h3>
                </div>
            </div>
        </div>

        <!-- Konten Tabel -->
        <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden min-h-[400px]">
            <div id="content-header" class="p-8 border-b border-slate-100 flex flex-col md:flex-row justify-between items-start md:items-center bg-white sticky top-0 z-10 gap-4"></div>

            <div id="kas-sub-tabs" class="hidden px-8 py-4 bg-slate-50 border-b border-slate-100 flex gap-2">
                <button onclick="switchKasView('masuk')" id="kas-view-masuk" class="px-4 py-1.5 rounded-full text-[10px] font-bold uppercase transition-all bg-blue-600 text-white shadow-sm">Dana Masuk Kas</button>
                <button onclick="switchKasView('luar')" id="kas-view-luar" class="px-4 py-1.5 rounded-full text-[10px] font-bold uppercase transition-all bg-white text-slate-500 border border-slate-200">Pengeluaran Kas</button>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead id="table-head"></thead>
                    <tbody id="table-body" class="divide-y divide-slate-50 text-sm"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal Form -->
    <div id="modal-container" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="relative bg-white w-full max-w-lg rounded-[3rem] shadow-2xl flex flex-col max-h-[90vh] overflow-hidden modal-animate-in">
            <div class="p-8 border-b border-slate-100 bg-white flex justify-between items-center shrink-0">
                <h3 id="modal-title" class="text-xl font-black text-slate-800 tracking-tight">Data Baru</h3>
                <button onclick="closeModal()" class="p-2 hover:bg-slate-100 rounded-full transition-colors"><i data-lucide="x" class="w-6 h-6 text-slate-400"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto p-8 space-y-8 custom-scrollbar">
                <form id="mainForm" onsubmit="handleFormSubmit(event)" class="space-y-6">
                    <div id="form-fields" class="space-y-6"></div>
                </form>
            </div>
            <div class="p-8 border-t border-slate-100 bg-slate-50 flex gap-4 shrink-0">
                <button type="button" onclick="closeModal()" class="flex-1 py-4 text-slate-500 font-black text-xs uppercase rounded-[1.5rem] border border-slate-200 hover:bg-white transition-all active:scale-95">Batal</button>
                <button form="mainForm" type="submit" class="flex-[2] py-4 bg-blue-600 shadow-blue-200 text-white font-black text-xs uppercase rounded-[1.5rem] shadow-xl hover:opacity-90 active:scale-95 transition-all flex items-center justify-center gap-3">
                    <i data-lucide="check-circle-2" class="w-5 h-5"></i> Simpan
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[60] hidden bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-2xl text-xs font-bold animate-bounce flex items-center gap-2">
        <i data-lucide="check-circle" class="w-4 h-4 text-emerald-400"></i> <span id="toast-msg">Pesan</span>
    </div>

    <script>
        // --- KONFIGURASI GOOGLE SHEET URL ---
        const SHEET_URL = "https://script.google.com/macros/s/AKfycbze9uXIf6fuyM_lQxZ68jsRBjUmRP_PPhVqzzjyGP2qitpo5TkelA9hqWm_OFF0F3xMYA/exec"; 

        const PILOT_RATE = 600000;
        const ENGINEER_RATE = 480000;
        const PREDEFINED_CATEGORIES = [
            'Catering', 'Ground Handling', 'Lounge', 'ARO', 
            'Towing Skatek', 'Entertaint Driver Pertamina', 'Sewa Pick Up'
        ];

        let crewEntries = [];
        let otherEntries = [];
        let incomeEntries = [];
        let kasInEntries = [];
        let kasOutEntries = [];
        
        let activeTab = 'crew';
        let activeKasView = 'masuk';
        let selectedSummaryCat = null;
        let editingId = null;

        // --- Core Helpers ---
        function formatIDR(amount) {
            const isNegative = amount < 0;
            const formatted = new Intl.NumberFormat('id-ID', {
                style: 'currency', currency: 'IDR', maximumFractionDigits: 0
            }).format(Math.abs(amount || 0));
            return isNegative ? `-${formatted}` : formatted;
        }

        function formatDateDisplay(dateStr) {
            if (!dateStr) return "-";
            try {
                const dateObj = new Date(dateStr);
                return new Intl.DateTimeFormat('id-ID', {
                    day: 'numeric',
                    month: 'long',
                    year: 'numeric'
                }).format(dateObj);
            } catch (e) { return dateStr; }
        }

        function showToast(msg) {
            const el = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            el.classList.remove('hidden');
            lucide.createIcons();
            setTimeout(() => el.classList.add('hidden'), 3000);
        }

        // --- API Sync ---
        async function fetchAllData() {
            if (!SHEET_URL) { showToast("URL Sheet belum diisi."); return; }
            document.getElementById('loader').style.display = 'flex';
            try {
                const response = await fetch(SHEET_URL);
                const data = await response.json();
                crewEntries = data.Crew || [];
                otherEntries = data.Others || [];
                incomeEntries = data.Income || [];
                kasInEntries = data.KasIn || [];
                kasOutEntries = data.KasOut || [];
                render();
            } catch (error) { showToast("Gagal mengambil data."); } 
            finally { document.getElementById('loader').style.display = 'none'; }
        }

        async function syncToSheet(sheetName, action, payload) {
            if (!SHEET_URL) return;
            document.getElementById('loader').style.display = 'flex';
            try {
                await fetch(SHEET_URL, {
                    method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ sheet: sheetName, action: action, data: payload })
                });
                showToast("Update Berhasil!");
            } catch (error) { showToast("Gagal Update."); }
            finally { document.getElementById('loader').style.display = 'none'; }
        }

        // --- Logic Calculations ---
        function calculateTotals() {
            let crewTotal = 0;
            crewEntries.forEach(c => {
                const rate = c.role === 'Pilot' ? PILOT_RATE : ENGINEER_RATE;
                crewTotal += (parseInt(c.allowanceDays) * rate) + (parseInt(c.transportDays) * parseInt(c.transportRate));
            });
            let otherTotal = 0;
            otherEntries.forEach(o => otherTotal += (parseInt(o.amount) || 0));
            let incomeTotal = 0;
            incomeEntries.forEach(i => incomeTotal += (parseInt(i.amount) || 0));
            const balance = incomeTotal - (crewTotal + otherTotal);

            document.getElementById('stat-crew-total').innerText = formatIDR(crewTotal);
            document.getElementById('stat-others-total').innerText = formatIDR(otherTotal);
            document.getElementById('stat-income-total').innerText = formatIDR(incomeTotal);
            const balanceEl = document.getElementById('stat-balance');
            balanceEl.innerText = formatIDR(balance);
            if (balance < 0) balanceEl.classList.add('text-red-400');
            else balanceEl.classList.remove('text-red-400');

            let kinTotal = 0;
            kasInEntries.forEach(k => kinTotal += parseInt(k.amount));
            let koutTotal = 0;
            kasOutEntries.forEach(k => koutTotal += parseInt(k.amount));
            const kBalance = kinTotal - koutTotal;

            document.getElementById('stat-kas-in-total').innerText = formatIDR(kinTotal);
            document.getElementById('stat-kas-out-total').innerText = formatIDR(koutTotal);
            document.getElementById('stat-kas-balance').innerText = formatIDR(kBalance);
            return { crewTotal, otherTotal, incomeTotal, balance, kBalance };
        }

        function getSummaryData() {
            let allowanceTotal = 0;
            let transportTotal = 0;
            crewEntries.forEach(c => {
                const rate = c.role === 'Pilot' ? PILOT_RATE : ENGINEER_RATE;
                allowanceTotal += (parseInt(c.allowanceDays) * rate);
                transportTotal += (parseInt(c.transportDays) * parseInt(c.transportRate));
            });
            const otherCategoryMap = {};
            otherEntries.forEach(o => {
                otherCategoryMap[o.category] = (otherCategoryMap[o.category] || 0) + parseInt(o.amount);
            });
            return [
                { category: 'Crew Allowance', total: allowanceTotal, count: crewEntries.length, type: 'crew' },
                { category: 'Crew Transport', total: transportTotal, count: crewEntries.length, type: 'crew' },
                ...Object.keys(otherCategoryMap).map(cat => ({
                    category: cat, total: otherCategoryMap[cat],
                    count: otherEntries.filter(e => e.category === cat).length, type: 'other'
                }))
            ].sort((a, b) => b.total - a.total);
        }

        // --- Navigation ---
        function switchTab(tab) {
            activeTab = tab;
            selectedSummaryCat = null;
            const mainStats = document.getElementById('main-stats');
            const kasStats = document.getElementById('kas-stats');
            const kasSub = document.getElementById('kas-sub-tabs');
            if(tab === 'kas') { mainStats.classList.add('hidden'); kasStats.classList.remove('hidden'); kasSub.classList.remove('hidden'); }
            else { mainStats.classList.remove('hidden'); kasStats.classList.add('hidden'); kasSub.classList.add('hidden'); }
            ['crew', 'others', 'income', 'kas', 'summary'].forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                if (t === tab) { btn.classList.add('bg-white', 'text-blue-600', 'shadow-sm'); btn.classList.remove('text-slate-500'); }
                else { btn.classList.remove('bg-white', 'text-blue-600', 'shadow-sm'); btn.classList.add('text-slate-500'); }
            });
            render();
        }

        function switchKasView(view) {
            activeKasView = view;
            const vm = document.getElementById('kas-view-masuk');
            const vl = document.getElementById('kas-view-luar');
            if(view === 'masuk') { vm.className = "px-4 py-1.5 rounded-full text-[10px] font-bold uppercase bg-blue-600 text-white shadow-sm"; vl.className = "px-4 py-1.5 rounded-full text-[10px] font-bold uppercase bg-white text-slate-500 border border-slate-200"; }
            else { vl.className = "px-4 py-1.5 rounded-full text-[10px] font-bold uppercase bg-red-600 text-white shadow-sm"; vm.className = "px-4 py-1.5 rounded-full text-[10px] font-bold uppercase bg-white text-slate-500 border border-slate-200"; }
            render();
        }

        // --- Render UI ---
        function render() {
            const header = document.getElementById('content-header');
            const head = document.getElementById('table-head');
            const body = document.getElementById('table-body');
            const sortByDate = (arr) => arr.sort((a, b) => new Date(b.date) - new Date(a.date));
            sortByDate(crewEntries); sortByDate(otherEntries); sortByDate(incomeEntries); sortByDate(kasInEntries); sortByDate(kasOutEntries);
            calculateTotals();

            let headerTitle = activeTab === 'crew' ? 'Rincian Crew' : activeTab === 'others' ? 'Others' : activeTab === 'income' ? 'Income' : activeTab === 'kas' ? 'Dana Kas' : 'Summary';
            let iconTab = activeTab === 'crew' ? 'plane' : activeTab === 'others' ? 'credit-card' : activeTab === 'kas' ? 'database' : 'bar-chart-3';

            header.innerHTML = `
                <div class="flex items-center gap-4">
                    ${selectedSummaryCat ? `<button onclick="closeDrilldown()" class="p-2 hover:bg-slate-100 rounded-full"><i data-lucide="chevron-left" class="w-6 h-6"></i></button>` : ''}
                    <div>
                        <h2 class="text-xl font-black text-slate-800 flex items-center gap-2 uppercase tracking-tight">
                            ${selectedSummaryCat ? `<span class="bg-blue-50 text-blue-600 p-2 rounded-xl"><i data-lucide="${selectedSummaryCat.type === 'crew' ? 'plane' : 'credit-card'}" class="w-5 h-5"></i></span> Rincian: ${selectedSummaryCat.category}` : 
                            `<i data-lucide="${iconTab}" class="${activeTab === 'crew' ? 'text-blue-600' : 'text-purple-600'}"></i> ${headerTitle}`}
                        </h2>
                        <p class="text-xs text-slate-400 font-medium mt-1">Data operasional harian aplikasi FinAir Pro.</p>
                    </div>
                </div>
                <div class="flex gap-2 w-full md:w-auto">
                    ${activeTab === 'summary' && !selectedSummaryCat ? `<button onclick="exportAllSummaryExcel()" class="flex-1 md:flex-none flex items-center justify-center gap-2 text-xs font-bold text-emerald-600 bg-emerald-50 hover:bg-emerald-100 px-4 py-2.5 rounded-xl border border-emerald-100 transition-all shadow-sm"><i data-lucide="file-spreadsheet" class="w-4 h-4"></i> EXPORT SUMMARY</button>` : ''}
                    ${selectedSummaryCat ? `<button onclick="exportCategoryExcel()" class="flex-1 md:flex-none flex items-center justify-center gap-2 text-xs font-bold text-blue-600 bg-blue-50 hover:bg-blue-100 px-4 py-2.5 rounded-xl border border-blue-100 transition-all shadow-sm"><i data-lucide="file-spreadsheet" class="w-4 h-4"></i> EXPORT EXCEL</button>` : ''}
                </div>
            `;

            if (selectedSummaryCat) {
                if (selectedSummaryCat.type === 'crew') {
                    head.innerHTML = `<tr class="bg-slate-50/50 text-slate-400 text-[10px] uppercase font-black tracking-widest"><th class="px-8 py-5">Tanggal</th><th class="px-8 py-5">Nama & Jabatan</th><th class="px-8 py-5">Allowance</th><th class="px-8 py-5 text-center">Total</th><th class="px-8 py-5 text-right">Aksi</th></tr>`;
                    body.innerHTML = crewEntries.map(item => `<tr class="hover:bg-slate-50"><td class="px-8 py-5 font-bold">${formatDateDisplay(item.date)}</td><td class="px-8 py-5 font-bold">${item.name}<br><span class="text-[10px] uppercase text-slate-400">${item.role}</span></td><td class="px-8 py-5">${formatIDR(parseInt(item.allowanceDays) * (item.role === 'Pilot' ? PILOT_RATE : ENGINEER_RATE))}</td><td class="px-8 py-5 text-center font-bold">${formatIDR((parseInt(item.allowanceDays) * (item.role === 'Pilot' ? PILOT_RATE : ENGINEER_RATE)) + (parseInt(item.transportDays) * parseInt(item.transportRate)))}</td><td class="px-8 py-5 text-right"><button onclick="editEntry('${item.id}', 'crew')" class="text-blue-600"><i data-lucide="edit-3" class="w-4 h-4"></i></button></td></tr>`).join('');
                } else {
                    const filtered = otherEntries.filter(e => e.category === selectedSummaryCat.category);
                    head.innerHTML = `<tr class="bg-slate-50/50 text-slate-400 text-[10px] uppercase font-black tracking-widest"><th class="px-8 py-5">Tanggal</th><th class="px-8 py-5">Item / Keperluan</th><th class="px-8 py-5 text-right">Nominal</th></tr>`;
                    body.innerHTML = filtered.map(item => `<tr class="hover:bg-slate-50"><td class="px-8 py-5 font-bold">${formatDateDisplay(item.date)}</td><td class="px-8 py-5 font-bold text-slate-800">${item.item}<br><span class="text-[10px] italic font-normal">${item.remarks}</span></td><td class="px-8 py-5 text-right font-black">${formatIDR(item.amount)}</td></tr>`).join('');
                }
            } else if (activeTab === 'crew') {
                head.innerHTML = `<tr class="bg-slate-50/50 text-slate-400 text-[10px] uppercase font-black tracking-widest"><th class="px-8 py-5">Tanggal</th><th class="px-8 py-5">Nama Crew</th><th class="px-8 py-5">Allowance</th><th class="px-8 py-5">Transport</th><th class="px-8 py-5 text-center">Total</th><th class="px-8 py-5 text-right">Aksi</th></tr>`;
                body.innerHTML = crewEntries.map(item => `<tr class="hover:bg-slate-50 group"><td class="px-8 py-5 font-bold text-slate-700">${formatDateDisplay(item.date)}</td><td class="px-8 py-5 font-bold">${item.name}</td><td class="px-8 py-5 text-xs">${formatIDR(parseInt(item.allowanceDays) * (item.role === 'Pilot' ? PILOT_RATE : ENGINEER_RATE))}<br><span class="opacity-50">${item.allowanceDays} Hr</span></td><td class="px-8 py-5 text-xs">${formatIDR(parseInt(item.transportDays) * parseInt(item.transportRate))}<br><span class="opacity-50">${item.transportDays} Hr</span></td><td class="px-8 py-5 text-center font-black">${formatIDR((parseInt(item.allowanceDays) * (item.role === 'Pilot' ? PILOT_RATE : ENGINEER_RATE)) + (parseInt(item.transportDays) * parseInt(item.transportRate)))}</td><td class="px-8 py-5 text-right"><div class="flex justify-end gap-2 opacity-0 group-hover:opacity-100"><button onclick="duplicateEntry('${item.id}', 'crew')" class="text-emerald-600"><i data-lucide="copy-plus" class="w-4 h-4"></i></button><button onclick="editEntry('${item.id}', 'crew')" class="text-blue-600"><i data-lucide="edit-3" class="w-4 h-4"></i></button><button onclick="deleteEntry('${item.id}', 'crew')" class="text-red-600"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div></td></tr>`).join('');
            } else if (activeTab === 'others') {
                head.innerHTML = `<tr class="bg-slate-50/50 text-slate-400 text-[10px] uppercase font-black tracking-widest"><th class="px-8 py-5">Tanggal</th><th class="px-8 py-5">Kategori / Item</th><th class="px-8 py-5 text-center">Nominal</th><th class="px-8 py-5 text-right">Aksi</th></tr>`;
                body.innerHTML = otherEntries.map(item => `<tr class="hover:bg-slate-50 group"><td class="px-8 py-5 font-bold">${formatDateDisplay(item.date)}</td><td class="px-8 py-5"><span class="bg-slate-100 px-2 py-1 rounded text-[10px] uppercase">${item.category}</span><br><span class="font-bold">${item.item}</span></td><td class="px-8 py-5 text-center font-black">${formatIDR(item.amount)}</td><td class="px-8 py-5 text-right"><div class="flex justify-end gap-2 opacity-0 group-hover:opacity-100"><button onclick="transferToKas('${item.id}')" class="text-purple-600"><i data-lucide="send" class="w-4 h-4"></i></button><button onclick="duplicateEntry('${item.id}', 'others')" class="text-emerald-600"><i data-lucide="copy-plus" class="w-4 h-4"></i></button><button onclick="editEntry('${item.id}', 'others')" class="text-blue-600"><i data-lucide="edit-3" class="w-4 h-4"></i></button><button onclick="deleteEntry('${item.id}', 'others')" class="text-red-600"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div></td></tr>`).join('');
            } else if (activeTab === 'income') {
                head.innerHTML = `<tr class="bg-slate-50/50 text-slate-400 text-[10px] uppercase font-black tracking-widest"><th class="px-8 py-5">Tanggal</th><th class="px-8 py-5">Keterangan</th><th class="px-8 py-5 text-center">Nominal</th><th class="px-8 py-5 text-right">Aksi</th></tr>`;
                body.innerHTML = incomeEntries.map(item => `<tr class="hover:bg-slate-50 group"><td class="px-8 py-5 font-bold">${formatDateDisplay(item.date)}</td><td class="px-8 py-5">${item.remarks}</td><td class="px-8 py-5 text-center font-black text-emerald-600">${formatIDR(item.amount)}</td><td class="px-8 py-5 text-right"><div class="flex justify-end gap-2 opacity-0 group-hover:opacity-100"><button onclick="editEntry('${item.id}', 'income')" class="text-blue-600"><i data-lucide="edit-3" class="w-4 h-4"></i></button><button onclick="deleteEntry('${item.id}', 'income')" class="text-red-600"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div></td></tr>`).join('');
            } else if (activeTab === 'kas') {
                const list = activeKasView === 'masuk' ? kasInEntries : kasOutEntries;
                const accent = activeKasView === 'masuk' ? 'text-blue-600' : 'text-red-600';
                head.innerHTML = `<tr class="bg-slate-50/50 text-slate-400 text-[10px] uppercase tracking-widest font-black"><th class="px-8 py-5">Tanggal</th><th class="px-8 py-5">Item</th><th class="px-8 py-5 text-center">Nominal</th><th class="px-8 py-5 text-right">Aksi</th></tr>`;
                body.innerHTML = list.map(item => `<tr class="hover:bg-slate-50 group"><td class="px-8 py-5 font-bold">${formatDateDisplay(item.date)}</td><td class="px-8 py-5 font-bold">${item.item}</td><td class="px-8 py-5 text-center font-black ${accent}">${formatIDR(item.amount)}</td><td class="px-8 py-5 text-right"><div class="flex justify-end gap-2 opacity-0 group-hover:opacity-100"><button onclick="editEntry('${item.id}', '${activeKasView==='masuk'?'kasIn':'kasOut'}')" class="text-blue-600"><i data-lucide="edit-3" class="w-4 h-4"></i></button><button onclick="deleteEntry('${item.id}', '${activeKasView==='masuk'?'kasIn':'kasOut'}')" class="text-red-600"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div></td></tr>`).join('');
            } else {
                head.innerHTML = `<tr class="bg-slate-50/50 text-slate-400 text-[10px] uppercase font-black tracking-widest"><th class="px-8 py-5">Kategori</th><th class="px-8 py-5 text-center">Item</th><th class="px-8 py-5 text-center">Kontribusi</th><th class="px-8 py-5 text-right">Total Akumulasi</th></tr>`;
                const summaryData = getSummaryData().filter(s => s.total > 0);
                const grand = calculateTotals().crewTotal + calculateTotals().otherTotal;
                body.innerHTML = summaryData.map(sum => `<tr onclick='selectedSummaryCat = ${JSON.stringify(sum)}; render();' class="hover:bg-slate-50 cursor-pointer group"><td class="px-8 py-6 flex items-center gap-4"><div class="p-3 rounded-xl ${sum.type==='crew'?'bg-blue-50 text-blue-600':'bg-purple-50 text-purple-600'}"><i data-lucide="${sum.type==='crew'?'plane':'credit-card'}" class="w-5 h-5"></i></div><span class="font-black text-slate-800">${sum.category}</span></td><td class="px-8 py-6 text-center font-bold text-slate-400">${sum.count} item</td><td class="px-8 py-6"><div class="w-32 mx-auto h-2 bg-slate-100 rounded-full overflow-hidden"><div class="h-full ${sum.type==='crew'?'bg-blue-500':'bg-purple-500'}" style="width: ${(sum.total/grand)*100}%"></div></div></td><td class="px-8 py-6 text-right font-black text-lg">${formatIDR(sum.total)} <i data-lucide="chevron-right" class="w-4 h-4 inline text-slate-300"></i></td></tr>`).join('');
            }
            lucide.createIcons();
        }

        // --- Export & Duplikasi ---
        function exportAllSummaryExcel() {
            const data = getSummaryData();
            let csv = "data:text/csv;charset=utf-8,";
            csv += "Kategori,Jumlah Item,Tipe,Total Akumulasi\r\n";
            data.forEach(s => csv += `"${s.category}",${s.count},"${s.type}",${s.total}\r\n`);
            const link = document.createElement("a"); link.setAttribute("href", encodeURI(csv)); link.setAttribute("download", "Summary_FinAir.csv"); document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }

        function exportCategoryExcel() {
            if (!selectedSummaryCat) return;
            let csv = "data:text/csv;charset=utf-8,";
            const headers = selectedSummaryCat.type === 'crew' ? ["Tanggal", "Nama", "Role", "Allowance Days", "Transport Days", "Remarks", "Total"] : ["Tanggal", "Kategori", "Item", "Remarks", "Nominal"];
            csv += headers.join(",") + "\r\n";
            const items = selectedSummaryCat.type === 'crew' ? crewEntries : otherEntries.filter(e => e.category === selectedSummaryCat.category);
            items.forEach(item => {
                let row = selectedSummaryCat.type === 'crew' ? [`"${item.date}"`, `"${item.name}"`, `"${item.role}"`, item.allowanceDays, item.transportDays, `"${item.remarks || ''}"`, (parseInt(item.allowanceDays)*(item.role==='Pilot'?PILOT_RATE:ENGINE_RATE))+(parseInt(item.transportDays)*parseInt(item.transportRate))] : [`"${item.date}"`, `"${item.category}"`, `"${item.item}"`, `"${item.remarks || ''}"`, item.amount];
                csv += row.join(",") + "\r\n";
            });
            const link = document.createElement("a"); link.setAttribute("href", encodeURI(csv)); link.setAttribute("download", `Detail_${selectedSummaryCat.category}.csv`); document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }

        async function transferToKas(id) {
            const item = otherEntries.find(e => e.id.toString() === id.toString());
            if(!item) return;
            const newEntry = { id: Date.now().toString(), date: item.date, item: `(Trans) ${item.item}`, amount: item.amount, remarks: `Kategori: ${item.category}` };
            kasOutEntries.push(newEntry);
            await syncToSheet("KasOut", "add", newEntry);
            showToast("Berhasil ditransfer ke Kas");
            render();
        }

        function openModal() {
            editingId = null;
            let type = activeTab === 'summary' ? 'crew' : activeTab;
            if (activeTab === 'kas') type = (activeKasView === 'masuk') ? 'kasIn' : 'kasOut';
            injectForm(type);
            document.getElementById('modal-container').classList.remove('hidden');
            lucide.createIcons();
        }

        function closeModal() { document.getElementById('modal-container').classList.add('hidden'); }

        function duplicateEntry(id, type) {
            editingId = null;
            const findById = (arr) => arr.find(e => e.id.toString() === id.toString());
            let data = (type === 'crew') ? findById(crewEntries) : (type === 'others') ? findById(otherEntries) : (type === 'income') ? findById(incomeEntries) : (type === 'kasIn') ? findById(kasInEntries) : findById(kasOutEntries);
            injectForm(type, data);
            document.getElementById('modal-container').classList.remove('hidden');
            document.getElementById('modal-title').innerText = "Duplikat Data";
            lucide.createIcons();
        }

        function editEntry(id, type) {
            editingId = id;
            const findById = (arr) => arr.find(e => e.id.toString() === id.toString());
            let data = (type === 'crew') ? findById(crewEntries) : (type === 'others') ? findById(otherEntries) : (type === 'income') ? findById(incomeEntries) : (type === 'kasIn') ? findById(kasInEntries) : findById(kasOutEntries);
            injectForm(type, data);
            document.getElementById('modal-container').classList.remove('hidden');
            document.getElementById('modal-title').innerText = "Edit Data";
            lucide.createIcons();
        }

        function injectForm(type, data = null) {
            const container = document.getElementById('form-fields');
            let html = `<input type="hidden" name="formType" value="${type}">`;
            
            // Kolom Tanggal Universal
            html += `<div class="space-y-4">
                <div class="space-y-1.5"><label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Tanggal</label>
                <input required name="date" type="date" value="${data ? data.date : new Date().toISOString().split('T')[0]}" class="w-full px-5 py-4 rounded-[1.5rem] border border-slate-200 font-bold text-slate-700"></div>`;

            if (type === 'others' || type === 'kasIn' || type === 'kasOut') {
                if (type === 'others') {
                    html += `<div class="space-y-1.5"><label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Kategori</label>
                    <select name="category" onchange="toggleCustomCategory(this.value)" class="w-full px-5 py-4 rounded-[1.5rem] border border-slate-200 font-bold bg-white text-slate-700 cursor-pointer">
                        ${PREDEFINED_CATEGORIES.map(c => `<option value="${c}" ${data && data.category === c ? 'selected' : ''}>${c}</option>`).join('')}
                        <option value="Lainnya" ${data && !PREDEFINED_CATEGORIES.includes(data.category) ? 'selected' : ''}>+ Tambah Manual</option>
                    </select>
                    <div id="custom-cat-wrapper" class="${data && !PREDEFINED_CATEGORIES.includes(data.category) ? '' : 'hidden'} mt-2">
                        <input name="customCategory" type="text" value="${data && !PREDEFINED_CATEGORIES.includes(data.category) ? data.category : ''}" class="w-full px-5 py-3 rounded-2xl border-2 border-dashed border-indigo-200 outline-none font-bold text-slate-700">
                    </div></div>`;
                }
                html += `<div class="space-y-1.5"><label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2">Item / Keperluan</label>
                    <input required name="item" type="text" value="${data ? data.item : ''}" class="w-full px-5 py-4 rounded-[1.5rem] border border-slate-200 font-bold text-slate-700"></div>
                    <div class="space-y-1.5"><label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Nominal</label>
                    <div class="relative"><span class="absolute left-5 top-1/2 -translate-y-1/2 font-black text-slate-400">Rp</span>
                    <input required name="amount" type="number" value="${data ? data.amount : 0}" class="w-full pl-12 pr-5 py-4 rounded-[1.5rem] border border-slate-200 outline-none font-black text-lg text-slate-700" onfocus="if(this.value=='0')this.value=''"></div></div>`;
            } else if (type === 'crew') {
                html += `<div class="space-y-1.5"><label class="text-[10px] font-bold text-slate-400 uppercase">Nama Lengkap</label>
                    <input required name="name" type="text" value="${data ? data.name : ''}" class="w-full px-5 py-4 rounded-[1.5rem] border border-slate-200 font-bold text-slate-700"></div>
                    <div class="space-y-1.5"><label class="text-[10px] font-bold text-slate-400 uppercase">Jabatan</label>
                    <select name="role" class="w-full px-5 py-4 rounded-[1.5rem] border border-slate-200 font-bold bg-white text-slate-700">
                        <option value="Pilot" ${data && data.role === 'Pilot' ? 'selected' : ''}>Pilot</option>
                        <option value="Engineer" ${data && data.role === 'Engineer' ? 'selected' : ''}>Engineer</option>
                    </select></div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="p-4 bg-indigo-50/50 rounded-2xl border border-indigo-100"><label class="text-[10px] font-black uppercase text-indigo-400">Allowance (Hari)</label>
                        <input required name="allowanceDays" type="number" value="${data ? data.allowanceDays : 0}" class="w-full bg-transparent outline-none font-black text-xl" onfocus="if(this.value=='0')this.value=''"></div>
                        <div class="p-4 bg-emerald-50/50 rounded-2xl border border-emerald-100"><label class="text-[10px] font-black uppercase text-emerald-400">Trans (Hari)</label>
                        <input required name="transportDays" type="number" value="${data ? data.transportDays : 0}" class="w-full bg-transparent outline-none font-black text-xl" onfocus="if(this.value=='0')this.value=''"></div>
                    </div>
                    <div class="p-4 bg-slate-50 rounded-2xl border border-slate-200"><label class="text-[10px] font-black uppercase text-slate-400 tracking-wider">Transport Rate / Hari</label>
                    <input required name="transportRate" type="number" value="${data ? data.transportRate : 300000}" class="w-full bg-transparent outline-none font-black text-xl text-slate-700" onfocus="if(this.value=='0')this.value=''"></div>`;
            } else if (type === 'income') {
                html += `<div class="space-y-1.5"><label class="text-[10px] font-bold text-slate-400 uppercase">Keterangan Dana</label>
                    <input required name="remarks" type="text" value="${data ? data.remarks : ''}" class="w-full px-5 py-4 rounded-[1.5rem] border border-slate-200 font-bold text-slate-700"></div>
                    <div class="space-y-1.5"><label class="text-[10px] font-bold text-slate-400 uppercase">Nominal</label>
                    <div class="relative"><span class="absolute left-5 top-1/2 -translate-y-1/2 font-black text-slate-400">Rp</span>
                    <input required name="amount" type="number" value="${data ? data.amount : 0}" class="w-full pl-12 pr-5 py-4 rounded-[1.5rem] border border-emerald-200 bg-emerald-50/20 font-black text-lg" onfocus="if(this.value=='0')this.value=''"></div></div>`;
            }
            
            html += `</div><div class="space-y-2 pt-2"><label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest pl-1">Remarks</label>
            <textarea name="remarks" class="w-full px-5 py-4 rounded-[1.5rem] border border-slate-200 outline-none text-sm min-h-[100px] text-slate-600 focus:border-blue-500">${data ? data.remarks : ''}</textarea></div>`;
            container.innerHTML = html; lucide.createIcons();
        }

        function toggleCustomCategory(val) {
            const wrapper = document.getElementById('custom-cat-wrapper');
            if(wrapper) { if(val === 'Lainnya') wrapper.classList.remove('hidden'); else wrapper.classList.add('hidden'); }
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const type = formData.get('formType');
            const sheetMap = { 'crew': 'Crew', 'others': 'Others', 'income': 'Income', 'kasIn': 'KasIn', 'kasOut': 'KasOut' };
            const payload = { id: editingId || Date.now().toString(), date: formData.get('date'), remarks: formData.get('remarks'), amount: parseInt(formData.get('amount')) || 0, item: formData.get('item') || "" };
            if (type === 'crew') { Object.assign(payload, { name: formData.get('name'), role: formData.get('role'), allowanceDays: parseInt(formData.get('allowanceDays')) || 0, transportDays: parseInt(formData.get('transportDays')) || 0, transportRate: parseInt(formData.get('transportRate')) || 0 }); if(editingId) crewEntries = crewEntries.map(e => e.id.toString() === editingId.toString() ? payload : e); else crewEntries.push(payload); }
            else if (type === 'others') { const cat = formData.get('category'); payload.category = (cat === 'Lainnya') ? formData.get('customCategory') : cat; if(editingId) otherEntries = otherEntries.map(e => e.id.toString() === editingId.toString() ? payload : e); else otherEntries.push(payload); }
            else if (type === 'income') { if(editingId) incomeEntries = incomeEntries.map(e => e.id.toString() === editingId.toString() ? payload : e); else incomeEntries.push(payload); }
            else if (type === 'kasIn') { if(editingId) kasInEntries = kasInEntries.map(e => e.id.toString() === editingId.toString() ? payload : e); else kasInEntries.push(payload); }
            else if (type === 'kasOut') { if(editingId) kasOutEntries = kasOutEntries.map(e => e.id.toString() === editingId.toString() ? payload : e); else kasOutEntries.push(payload); }
            await syncToSheet(sheetMap[type], editingId ? 'update' : 'add', payload);
            closeModal(); render();
        }

        async function deleteEntry(id, type) {
            if (confirm("Hapus data ini?")) {
                const sheetMap = { 'crew': 'Crew', 'others': 'Others', 'income': 'Income', 'kasIn': 'KasIn', 'kasOut': 'KasOut' };
                if (type === 'crew') crewEntries = crewEntries.filter(e => e.id.toString() !== id.toString());
                else if (type === 'others') otherEntries = otherEntries.filter(e => e.id.toString() !== id.toString());
                else if (type === 'income') incomeEntries = incomeEntries.filter(e => e.id.toString() !== id.toString());
                else if (type === 'kasIn') kasInEntries = kasInEntries.filter(e => e.id.toString() !== id.toString());
                else kasOutEntries = kasOutEntries.filter(e => e.id.toString() !== id.toString());
                await syncToSheet(sheetMap[type], 'delete', { id: id });
                render();
            }
        }

        function closeDrilldown() { selectedSummaryCat = null; render(); }
        window.onload = () => { fetchAllData(); };
    </script>
</body>
</html>
